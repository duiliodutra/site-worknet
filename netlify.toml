[build]
  publish = "."

[[redirects]]
  from = "/gestaoworknet"
  to = "https://duiliodutra.github.io/gestao-sistema/"
  status = 200
  force = true

[[redirects]]
  from = "/gestaoworknet/*"
  to = "https://duiliodutra.github.io/gestao-sistema/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
